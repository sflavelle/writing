# .github/workflows/ai-summary.yml
# This
name: AI Commit Summarizer

on:
  push:
    branches:
      - main # or master

jobs:
  summarize_and_post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch the full history to calculate the diff
          fetch-depth: 0 

      - name: Get Diff and Save to File
        # Compares the head commit to the commit before it
        run: git diff ${{ github.event.before }} ${{ github.sha }} > diff.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run AI Summarizer Script
        # This is where your custom script runs, uses the API key (as a secret), 
        # reads diff.txt, calls the AI, and saves the summary to a new file.
        run: python ./scripts/summarize.py
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: Post Summary to Webhook
        # Use an action or curl to send the content of the summary file
        uses: rjstone/discord-webhook-action@v1 # Example for Discord
        with:
          webhook-id: ${{ secrets.WEBHOOK_ID }}
          webhook-token: ${{ secrets.WEBHOOK_TOKEN }}
          content: "📚 **New Story Updates** 📚\n\n$(cat summary.md)"
